<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nossas Metas & Negócios 🎯</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-color: #2d3748;
            --accent-color: #2c7a7b;
            --accent-light: rgba(230, 255, 250, 0.95);
            --border-color: rgba(226, 232, 240, 0.9);
            --success-color: #38a169;
            --warning-color: #dd6b20;
            --danger-color: #e53e3e;
            --bg-fade: rgba(247, 250, 252, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --card-bg: rgba(45, 55, 72, 0.94);
                --text-color: #edf2f7;
                --border-color: rgba(74, 85, 104, 0.9);
                --accent-light: rgba(35, 78, 82, 0.95);
                --bg-fade: rgba(26, 32, 44, 1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            min-height: 100vh;
            height: 100%;
        }

        body {
            background-color: var(--bg-fade);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('./casal.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            opacity: 0.18; 
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 22px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 5px;
            font-weight: 800;
        }

        @media (prefers-color-scheme: dark) {
            header h1 { color: #81e6d9; }
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(44, 122, 123, 0.25);
        }

        @media (prefers-color-scheme: dark) {
            .tab-btn.active { background: #4fd1c5; color: #1a202c; }
        }

        .dashboard {
            background: var(--accent-light);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            text-align: center;
            border: 1px solid rgba(44, 122, 123, 0.25);
        }

        .dash-card h4 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .dash-card p {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-color);
        }

        @media (prefers-color-scheme: dark) {
            .dash-card p { color: #81e6d9; }
        }

        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-form input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.98);
            color: #2d3748;
            font-size: 14px;
        }

        @media (prefers-color-scheme: dark) {
            .add-form input { background: rgba(30, 41, 59, 0.98); color: #edf2f7; }
        }

        .add-form button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        #lista-vazia, #loading-status {
            text-align: center;
            padding: 30px;
            opacity: 0.8;
            font-size: 14px;
            font-weight: 500;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
        }

        @media (prefers-color-scheme: dark) {
            .meta-item { background: rgba(45, 55, 72, 0.75); }
        }

        .item-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        .item-left input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--success-color);
            cursor: pointer;
        }

        .item-title-input {
            font-size: 15px;
            font-weight: 600;
            background: transparent;
            border: 1px transparent dashed;
            color: var(--text-color);
            padding: 4px;
            border-radius: 6px;
            width: 100%;
            transition: all 0.2s;
        }

        .item-title-input:hover {
            border-color: var(--border-color);
            background: rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .item-title-input:focus {
            background: white;
            border: 1px solid var(--accent-color);
            outline: none;
            cursor: text;
        }

        @media (prefers-color-scheme: dark) {
            .item-title-input:focus { background: #1a202c; }
        }

        .item-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 8px;
        }

        @media (prefers-color-scheme: dark) {
            .action-btn { background: rgba(30,41,59,0.8); color: white; }
        }

        .item-finances {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        @media (max-width: 520px) {
            .item-finances {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .input-group label {
            font-size: 11px;
            opacity: 0.9;
            font-weight: 700;
        }

        .input-group input, .input-group select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            color: #2d3748;
            font-size: 13px;
            width: 100%;
            height: 33px;
        }

        .input-group select {
            font-weight: 700;
            cursor: pointer;
        }

        /* Cores dinâmicas para as prioridades */
        select.prio-alta { color: var(--danger-color); }
        select.prio-media { color: var(--warning-color); }
        select.prio-baixa { color: var(--success-color); }

        @media (prefers-color-scheme: dark) {
            .input-group input, .input-group select { background: rgba(30,41,59,0.95); color: white; }
            select.prio-baixa { color: #81e6d9; }
        }

        .result-box {
            padding: 8px;
            background: rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            min-height: 33px;
            display: flex;
            align-items: center;
        }

        .missing-value { color: var(--warning-color); }
        .completed-value { color: var(--success-color); }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--success-color);
            transition: width 0.3s ease;
        }

        .meta-item.item-done {
            border-color: var(--success-color);
            background: rgba(240, 253, 244, 0.92);
        }

        @media (prefers-color-scheme: dark) {
            .meta-item.item-done { background: rgba(20, 50, 35, 0.85); border-color: var(--success-color); }
        }

        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            opacity: 0.9;
            font-weight: 600;
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"
        }
      }
    </script>
</head>
<body>

<div class="container">
    <header>
        <h1>Nossas Conquistas 🎯</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tab-metas">🎯 Metas</button>
        <button class="tab-btn" id="tab-compras">🛒 Compras</button>
        <button class="tab-btn" id="tab-vendas">💰 Vendas</button>
    </div>

    <div class="dashboard">
        <div class="dash-card"><h4 id="lbl-dash-1">Total</h4><p id="total-geral">R$ 0,00</p></div>
        <div class="dash-card"><h4 id="lbl-dash-2">Guardado</h4><p id="total-guardado">R$ 0,00</p></div>
        <div class="dash-card"><h4 id="lbl-dash-3">Falta</h4><p id="total-falta" style="color: var(--warning-color);">R$ 0,00</p></div>
    </div>

    <div class="add-form">
        <input type="text" id="novo-item-nome" placeholder="Adicionar à aba atual...">
        <button id="btn-adicionar">Adicionar</button>
    </div>

    <div id="loading-status">Conectando ao Firebase... ⚡</div>

    <div id="lista-container" style="display: none;">
        <div id="lista-vazia" style="display: none;">Nenhum item aqui. Digite acima para começar! 🚀</div>
    </div>

    <footer>
        <p>Construindo nosso futuro juntos. 🥂</p>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyClqzHI7NIrwA9IDQURiQJyRSrYOlSWTgw",
  authDomain: "metas-casal-3634f.firebaseapp.com",
  databaseURL: "https://metas-casal-3634f-default-rtdb.firebaseio.com",
  projectId: "metas-casal-3634f",
  storageBucket: "metas-casal-3634f.firebasestorage.app",
  messagingSenderId: "560839559922",
  appId: "1:560839559922:web:791748f331a14fe619de6b",
  measurementId: "G-6KYY49B2ZQ"
    };

    const SENHA_CORRETA = '1234'; 
    let bancoDadosCompleto = { metas: [], compras: [], vendas: [] };
    let abaAtiva = 'metas';

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'sistema_casal_v2');

    const formatMoeda = (valor) => {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    };

    const alternarAba = (novaAba) => {
        abaAtiva = novaAba;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${novaAba}`).classList.add('active');
        
        const inputAdd = document.getElementById('novo-item-nome');
        if(novaAba === 'metas') {
            inputAdd.placeholder = "O que vamos planejar? Ex: Viagem, Reforma...";
            document.getElementById('lbl-dash-1').textContent = "Total";
            document.getElementById('lbl-dash-2').textContent = "Guardado";
            document.getElementById('lbl-dash-3').textContent = "Falta";
        } else if(novaAba === 'compras') {
            inputAdd.placeholder = "O que precisamos comprar? Ex: Geladeira, Pneus...";
            document.getElementById('lbl-dash-1').textContent = "Custo Total";
            document.getElementById('lbl-dash-2').textContent = "Pago";
            document.getElementById('lbl-dash-3').textContent = "Falta Pagar";
        } else if(novaAba === 'vendas') {
            inputAdd.placeholder = "O que vamos vender? Ex: Chevrolet Astra...";
            document.getElementById('lbl-dash-1').textContent = "Valor Alvo";
            document.getElementById('lbl-dash-2').textContent = "Recebido";
            document.getElementById('lbl-dash-3').textContent = "A Receber";
        }
        renderizarLista();
    };

    document.getElementById('tab-metas').addEventListener('click', () => alternarAba('metas'));
    document.getElementById('tab-compras').addEventListener('click', () => alternarAba('compras'));
    document.getElementById('tab-vendas').addEventListener('click', () => alternarAba('vendas'));

    onValue(dbRef, (snapshot) => {
        const dados = snapshot.val();
        if (dados) {
            bancoDadosCompleto.metas = dados.metas || [];
            bancoDadosCompleto.compras = dados.compras || [];
            bancoDadosCompleto.vendas = dados.vendas || [];
        } else {
            bancoDadosCompleto = { metas: [], compras: [], vendas: [] };
        }
        
        document.getElementById('loading-status').style.display = 'none';
        document.getElementById('lista-container').style.display = 'block';
        renderizarLista();
    });

    const sincronizarComFirebase = () => {
        set(dbRef, bancoDadosCompleto);
    };

    const renderizarLista = () => {
        const container = document.getElementById('lista-container');
        const vaziaDiv = document.getElementById('lista-vazia');
        
        container.querySelectorAll('.meta-item').forEach(el => el.remove());
        const itensAtuais = bancoDadosCompleto[abaAtiva];

        if (itensAtuais.length === 0) {
            vaziaDiv.style.display = 'block';
        } else {
            vaziaDiv.style.display = 'none';
        }

        let globalTotal = 0; let globalGuardado = 0; let globalFalta = 0;

        itensAtuais.forEach((item, index) => {
            const total = parseFloat(item.total) || 0;
            const guardado = parseFloat(item.guardado) || 0;
            const prioridade = item.prioridade || 'media'; // Padrão Média se não houver
            let falta = total - guardado; if (falta < 0) falta = 0;

            globalTotal += total; globalGuardado += guardado; globalFalta += falta;
            const pPct = total > 0 ? Math.min((guardado / total) * 100, 100) : 0;

            const itemDiv = document.createElement('div');
            itemDiv.className = `meta-item ${item.checked ? 'item-done' : ''}`;
            
            let lbl1 = "Valor Total", lbl2 = "Já Guardado", lbl3 = "Falta", lblDone = "Concluído!";
            if(abaAtiva === 'compras') { lbl2 = "Já Pago"; lbl3 = "A pagar"; lblDone = "Pago!"; }
            if(abaAtiva === 'vendas') { lbl1 = "Preço Venda"; lbl2 = "Recebido"; lbl3 = "A receber"; lblDone = "Vendido!"; }

            itemDiv.innerHTML = `
                <div class="item-main">
                    <div class="item-left">
                        <input type="checkbox" class="done-check" ${item.checked ? 'checked' : ''}>
                        <input type="text" class="item-title-input" value="${item.nome}">
                    </div>
                    <div class="item-actions">
                        <button class="action-btn btn-search">🔍</button>
                        <button class="action-btn btn-delete" style="color: var(--danger-color);">🗑️</button>
                    </div>
                </div>
                <div class="item-finances">
                    <div class="input-group">
                        <label>Prioridade</label>
                        <select class="prio-select prio-${prioridade}">
                            <option value="baixa" ${prioridade === 'baixa' ? 'selected' : ''}>Baixa</option>
                            <option value="media" ${prioridade === 'media' ? 'selected' : ''}>Média</option>
                            <option value="alta" ${prioridade === 'alta' ? 'selected' : ''}>Alta</option>
                        </select>
                    </div>
                    <div class="input-group"><label>${lbl1}</label><input type="number" class="val-total" value="${item.total}" step="0.01"></div>
                    <div class="input-group"><label>${lbl2}</label><input type="number" class="val-guardado" value="${item.guardado}" step="0.01"></div>
                    <div class="input-group"><label>${lbl3}</label><div class="result-box ${falta === 0 && total > 0 ? 'completed-value' : 'missing-value'}">${falta === 0 && total > 0 ? lblDone : formatMoeda(falta)}</div></div>
                </div>
                <div class="progress-bar-container"><div class="progress-bar" style="width: ${pPct}%"></div></div>
            `;

            const inputNome = itemDiv.querySelector('.item-title-input');
            inputNome.addEventListener('change', (e) => {
                bancoDadosCompleto[abaAtiva][index].nome = e.target.value.trim();
                sincronizarComFirebase();
            });
            inputNome.addEventListener('keypress', (e) => { if(e.key === 'Enter') inputNome.blur(); });

            const selectPrio = itemDiv.querySelector('.prio-select');
            selectPrio.addEventListener('change', (e) => {
                const novaPrio = e.target.value;
                bancoDadosCompleto[abaAtiva][index].prioridade = novaPrio;
                
                // Atualiza a classe de cor na hora
                selectPrio.className = `prio-select prio-${novaPrio}`;
                sincronizarComFirebase();
            });

            itemDiv.querySelector('.done-check').addEventListener('change', (e) => {
                bancoDadosCompleto[abaAtiva][index].checked = e.target.checked;
                sincronizarComFirebase();
            });

            itemDiv.querySelector('.val-total').addEventListener('change', (e) => {
                bancoDadosCompleto[abaAtiva][index].total = e.target.value;
                sincronizarComFirebase();
            });

            itemDiv.querySelector('.val-guardado').addEventListener('change', (e) => {
                bancoDadosCompleto[abaAtiva][index].guardado = e.target.value;
                sincronizarComFirebase();
            });

            itemDiv.querySelector('.val-total').addEventListener('input', () => atualizarApenasTotaisLocais());
            itemDiv.querySelector('.val-guardado').addEventListener('input', () => atualizarApenasTotaisLocais());

            itemDiv.querySelector('.btn-search').addEventListener('click', () => {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(item.nome)}`, '_blank');
            });

            itemDiv.querySelector('.btn-delete').addEventListener('click', () => {
                const senhaDigitada = prompt('Digite a senha para confirmar a exclusão:');
                if (senhaDigitada === SENHA_CORRETA) {
                    bancoDadosCompleto[abaAtiva].splice(index, 1);
                    sincronizarComFirebase();
                } else if (senhaDigitada !== null) {
                    alert('Senha incorreta!');
                }
            });

            container.appendChild(itemDiv);
        });

        document.getElementById('total-geral').textContent = formatMoeda(globalTotal);
        document.getElementById('total-guardado').textContent = formatMoeda(globalGuardado);
        document.getElementById('total-falta').textContent = formatMoeda(globalFalta);
    };

    const atualizarApenasTotaisLocais = () => {
        let globalTotal = 0; let globalGuardado = 0; let globalFalta = 0;
        document.querySelectorAll('.meta-item').forEach((item) => {
            const total = parseFloat(item.querySelector('.val-total').value) || 0;
            const guardado = parseFloat(item.querySelector('.val-guardado').value) || 0;
            let falta = total - guardado; if (falta < 0) falta = 0;
            globalTotal += total; globalGuardado += guardado; globalFalta += falta;
            
            let lblDone = "Concluído!";
            if(abaAtiva === 'compras') lblDone = "Pago!";
            if(abaAtiva === 'vendas') lblDone = "Recebido!";

            item.querySelector('.result-box').textContent = (falta === 0 && total > 0) ? lblDone : formatMoeda(falta);
            item.querySelector('.progress-bar').style.width = `${total > 0 ? Math.min((guardado / total) * 100, 100) : 0}%`;
        });
        document.getElementById('total-geral').textContent = formatMoeda(globalTotal);
        document.getElementById('total-guardado').textContent = formatMoeda(globalGuardado);
        document.getElementById('total-falta').textContent = formatMoeda(globalFalta);
    };

    const adicionarNovoItem = () => {
        const input = document.getElementById('novo-item-nome');
        if (input.value.trim() === '') return;
        
        if (!bancoDadosCompleto[abaAtiva]) bancoDadosCompleto[abaAtiva] = [];
        
        bancoDadosCompleto[abaAtiva].push({ 
            nome: input.value.trim(), 
            checked: false, 
            total: '', 
            guardado: '',
            prioridade: 'media' // Padrão ao criar novo
        });
        
        input.value = '';
        sincronizarComFirebase();
    };

    document.getElementById('btn-adicionar').addEventListener('click', adicionarNovoItem);
    document.getElementById('novo-item-nome').addEventListener('keypress', (e) => { if (e.key === 'Enter') adicionarNovoItem(); });
</script>
</body>
</html>
